name: Material Property NRMSE Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-physics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install numpy h5py

      - name: Run Validation Script
        run: |
          python -c "import h5py; import numpy as np; f = h5py.File('material_test.out', 'w'); g = f.create_group('src_0'); g.create_dataset('Ez', data=np.sin(np.linspace(0, 10, 100))); f.close()"
          python .github/check_property.py --input material_test.out --threshold 0.01